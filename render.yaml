# GoldWitch — Render Blueprint
# New → Blueprint → this repo
# MySQL private service needs a paid Starter plan (disk).

services:
  # MySQL first so Blueprint provisions DB before the web app boots hard against it
  - type: pserv
    name: goldwitch-mysql
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./docker/mysql/Dockerfile
    dockerContext: ./docker/mysql
    disk:
      name: goldwitch-mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: vgowitch
      - key: MYSQL_USER
        value: casino
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  - type: web
    name: goldwitch
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node start.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: GoldWitch.com
      - key: APP_ABBREVIATION
        value: GoldWitch
      - key: APP_SECURE
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: MYSQLHOST
        fromService:
          name: goldwitch-mysql
          type: pserv
          property: host
      - key: MYSQLPORT
        value: "3306"
      - key: MYSQLDATABASE
        value: vgowitch
      - key: MYSQLUSER
        value: casino
      - key: MYSQLPASSWORD
        fromService:
          name: goldwitch-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
