# GoldWitch — Render Blueprint
# After changing the DB service: delete goldwitch-mysql in the dashboard, then Manual sync.

services:
  - type: pserv
    name: goldwitch-mysql
    runtime: docker
    plan: starter
    region: oregon
    # Official Render MySQL example (more reliable than a custom image on an old disk)
    repo: https://github.com/render-examples/mysql.git
    disk:
      name: goldwitch-mysql-data-v3
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: vgowitch
      - key: MYSQL_USER
        value: casino
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  - type: web
    name: goldwitch
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node start.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: GoldWitch.com
      - key: APP_ABBREVIATION
        value: GoldWitch
      - key: APP_SECURE
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: MYSQLHOST
        fromService:
          name: goldwitch-mysql
          type: pserv
          property: host
      - key: MYSQLPORT
        value: "3306"
      - key: MYSQLDATABASE
        value: vgowitch
      - key: MYSQLUSER
        value: casino
      - key: MYSQLPASSWORD
        fromService:
          name: goldwitch-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: APP_URL
        value: https://goldwitch-8gft.onrender.com
      - key: DRAKON_AGENT_CODE
        sync: false
      - key: DRAKON_AGENT_TOKEN
        sync: false
      - key: DRAKON_AGENT_SECRET_KEY
        sync: false
      - key: DRAKON_AGENT_CURRENCY
        value: USD
      - key: DRAKON_LANGUAGE
        value: en
      - key: CASINO_MARKET
        value: ohio
      - key: CASINO_REAL_MONEY_ONLY
        value: "true"
